<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copilot Settings</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="settings-container">
    <h2>Settings</h2>
    
    <div class="section">
      <h3>AI Provider</h3>
      <div class="provider-selector">
        <label>
          <input type="radio" name="provider" value="chatgpt" checked>
          ChatGPT
        </label>
        <label>
          <input type="radio" name="provider" value="gemini">
          Gemini
        </label>
        <label>
          <input type="radio" name="provider" value="claude">
          Claude
        </label>
        <label>
          <input type="radio" name="provider" value="kimi">
          Kimi AI
        </label>
        <label>
          <input type="radio" name="provider" value="deepseek">
          DeepSeek
        </label>
        <label>
          <input type="radio" name="provider" value="googlesearch">
          Google Search AI Mode
        </label>
      </div>
    </div>

    <div class="section">
      <h3>Authentication</h3>
      <div class="auth-status" id="auth-status">
        Checking status...
      </div>
      <button id="login-btn" class="btn">Log In</button>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
