<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-panel: rgba(12, 12, 16, 0.94);
      --bg-item: rgba(255, 255, 255, 0.04);
      --bg-item-hover: rgba(107, 76, 255, 0.12);
      --bg-item-selected: rgba(107, 76, 255, 0.18);
      --border-glass: rgba(255, 255, 255, 0.08);
      --text-main: #f0f0f5;
      --text-muted: #8a8a9a;
      --text-dim: #5a5a6a;
      --accent: #8b5cf6;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body, html {
      width: 100%; height: 100%; overflow: hidden;
      font-family: 'Inter', -apple-system, sans-serif;
      background: transparent; color: var(--text-main);
      font-size: 13px; -webkit-font-smoothing: antialiased;
    }

    .picker {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      background: var(--bg-panel);
      backdrop-filter: blur(40px) saturate(1.4);
      border: 1px solid var(--border-glass);
      border-radius: 14px; overflow: hidden;
      animation: slideIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .search-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-glass);
      -webkit-app-region: drag;
    }

    .search-icon { color: var(--accent); flex-shrink: 0; }

    #search-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text-main); font-size: 14px; font-family: inherit;
      -webkit-app-region: no-drag;
    }

    #search-input::placeholder { color: var(--text-dim); }

    .hint { color: var(--text-dim); font-size: 11px; flex-shrink: 0; -webkit-app-region: no-drag; }
    .hint kbd {
      background: rgba(255,255,255,0.08); padding: 1px 5px; border-radius: 3px;
      font-weight: 600; border: 1px solid rgba(255,255,255,0.08); font-family: inherit; font-size: 10px;
    }

    .conv-list {
      flex: 1; overflow-y: auto; padding: 6px 8px;
    }

    .conv-list::-webkit-scrollbar { width: 5px; }
    .conv-list::-webkit-scrollbar-track { background: transparent; }
    .conv-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    .conv-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px;
      cursor: pointer; transition: all 0.15s ease;
      border: 1px solid transparent;
    }

    .conv-item:hover { background: var(--bg-item-hover); border-color: rgba(107,76,255,0.15); }
    .conv-item.selected { background: var(--bg-item-selected); border-color: rgba(107,76,255,0.3); }

    .conv-icon { font-size: 16px; flex-shrink: 0; opacity: 0.7; }
    .conv-title {
      flex: 1; font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .conv-arrow { color: var(--text-dim); font-size: 11px; opacity: 0; transition: opacity 0.15s; }
    .conv-item:hover .conv-arrow { opacity: 1; }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 40px; text-align: center;
      color: var(--text-dim); gap: 8px;
    }

    .loading { color: var(--text-muted); padding: 20px; text-align: center; }

    .footer {
      padding: 8px 16px; font-size: 11px; color: var(--text-dim);
      text-align: center; border-top: 1px solid var(--border-glass);
    }
  </style>
</head>
<body>
  <div class="picker">
    <div class="search-bar">
      <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search conversations..." autocomplete="off" spellcheck="false" autofocus>
      <span class="hint"><kbd>↵</kbd> select &nbsp; <kbd>Esc</kbd> close</span>
    </div>
    <div id="conv-list" class="conv-list">
      <div class="loading">Loading conversations...</div>
    </div>
    <div class="footer">
      <kbd>↑↓</kbd> navigate &nbsp;·&nbsp; <kbd>↵</kbd> open conversation &nbsp;·&nbsp; <kbd>Ctrl+Shift+H</kbd> toggle
    </div>
  </div>

  <script>
    (function() {
      const listEl = document.getElementById('conv-list');
      const searchInput = document.getElementById('search-input');
      let conversations = [];
      let filtered = [];
      let selectedIdx = 0;

      async function init() {
        try {
          conversations = await window.copilotAPI.getConversationList();
          filtered = [...conversations];
          render();
        } catch(e) {
          listEl.innerHTML = '<div class="empty-state"><div>💬</div><div>Could not load conversations</div></div>';
        }
      }

      function render() {
        if (filtered.length === 0) {
          listEl.innerHTML = '<div class="empty-state"><div>💬</div><div>No conversations found</div></div>';
          return;
        }

        listEl.innerHTML = filtered.map((c, i) => `
          <div class="conv-item ${i === selectedIdx ? 'selected' : ''}" data-idx="${i}">
            <span class="conv-icon">💬</span>
            <span class="conv-title">${escapeHtml(c.title)}</span>
            <span class="conv-arrow">→</span>
          </div>
        `).join('');

        // Click handlers
        listEl.querySelectorAll('.conv-item').forEach(el => {
          el.addEventListener('click', () => {
            const idx = parseInt(el.dataset.idx);
            selectConversation(filtered[idx]);
          });
        });

        // Scroll selected into view
        const selected = listEl.querySelector('.selected');
        if (selected) selected.scrollIntoView({ block: 'nearest' });
      }

      function selectConversation(conv) {
        if (conv && conv.url) {
          window.copilotAPI.selectConversation(conv.url, conv.title);
        }
      }

      // Search filter
      searchInput.addEventListener('input', () => {
        const q = searchInput.value.toLowerCase().trim();
        filtered = q ? conversations.filter(c => c.title.toLowerCase().includes(q)) : [...conversations];
        selectedIdx = 0;
        render();
      });

      // Keyboard navigation
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          selectedIdx = Math.min(selectedIdx + 1, filtered.length - 1);
          render();
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          selectedIdx = Math.max(selectedIdx - 1, 0);
          render();
        } else if (e.key === 'Enter') {
          e.preventDefault();
          if (filtered[selectedIdx]) selectConversation(filtered[selectedIdx]);
        } else if (e.key === 'Escape') {
          window.copilotAPI.toggleConversationPicker();
        }
      });

      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str || '';
        return div.innerHTML;
      }

      // Listen for refresh
      if (window.copilotAPI.onConversationsLoaded) {
        window.copilotAPI.onConversationsLoaded((data) => {
          conversations = data || [];
          filtered = [...conversations];
          selectedIdx = 0;
          render();
        });
      }

      document.addEventListener('DOMContentLoaded', init);
    })();
  </script>
</body>
</html>
