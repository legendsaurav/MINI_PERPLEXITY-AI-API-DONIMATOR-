<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="projects.css">
</head>
<body>
  <div class="panel">
    <!-- Header / Drag Region -->
    <div id="drag-region" class="header">
      <div class="header-left">
        <svg class="header-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="url(#hg)" stroke-width="2">
          <defs><linearGradient id="hg" x1="0" y1="0" x2="24" y2="24"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs>
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        <span class="header-title">Projects</span>
      </div>
      <div class="header-actions no-drag">
        <button id="btn-new-project" class="header-btn" title="New Project">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button id="btn-close" class="header-btn btn-close" title="Close">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <!-- New Project Dialog (hidden) -->
    <div id="new-project-dialog" class="new-project-dialog" style="display:none;">
      <div class="new-project-input-wrap">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" class="np-icon"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <input type="text" id="new-project-input" placeholder="Project name..." autocomplete="off" spellcheck="false">
        <span class="np-hint"><kbd>↵</kbd></span>
      </div>
    </div>

    <!-- Context Banner -->
    <div id="context-banner" class="context-banner" style="display:none;">
      <div class="context-dot"></div>
      <span id="context-text" class="context-text">Auto-detected: VS Code</span>
    </div>

    <!-- Current Project Section -->
    <div class="section">
      <div class="section-header">Current Project</div>
      <div id="active-project-container"></div>
    </div>

    <!-- All Projects Section -->
    <div class="section section-list">
      <div class="section-header">All Projects</div>
      <div id="project-list" class="project-list"></div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <kbd>Ctrl+Shift+P</kbd> toggle &nbsp;·&nbsp; <kbd>Ctrl+Shift+N</kbd> new project
    </div>
  </div>

  <script src="projects.js"></script>
</body>
</html>
